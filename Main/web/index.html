<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D 5e Voice Session</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0d8c8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #16213e;
      border-bottom: 2px solid #c8a96e;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.3rem;
      color: #c8a96e;
      font-variant: small-caps;
      letter-spacing: 1px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-disconnected { background: #5c2020; color: #f0a0a0; }
    .status-connecting { background: #5c4a20; color: #f0d0a0; }
    .status-connected { background: #205c20; color: #a0f0a0; }

    /* Main layout */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Narration log */
    .narration-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
    }

    .narration-log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .narration-entry {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.5;
    }

    .narration-narrative {
      background: #2a2a3e;
      border-left: 3px solid #c8a96e;
    }

    .narration-mechanics {
      background: #1e2a3e;
      border-left: 3px solid #4a90d9;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
    }

    .narration-player {
      background: #2a3e2a;
      border-left: 3px solid #6abf6a;
    }

    .narration-system {
      background: #3e2a2a;
      border-left: 3px solid #bf6a6a;
      font-style: italic;
    }

    /* Combat panel */
    .combat-panel {
      width: 320px;
      background: #16213e;
      display: flex;
      flex-direction: column;
      display: none;
    }

    .combat-panel.active { display: flex; }

    .combat-header {
      padding: 12px;
      background: #0f1a30;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    .combat-header h2 {
      font-size: 1rem;
      color: #c8a96e;
    }

    .combatant-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .combatant {
      padding: 8px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .combatant.active {
      background: #2a3e5e;
      border: 1px solid #c8a96e;
    }

    .combatant.player { color: #a0d0a0; }
    .combatant.npc { color: #d0a0a0; }

    .hp-bar {
      width: 60px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }

    .hp-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .hp-healthy { background: #4caf50; }
    .hp-wounded { background: #ff9800; }
    .hp-critical { background: #f44336; }

    /* Action buttons */
    .action-buttons {
      padding: 12px;
      border-top: 1px solid #333;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .action-btn {
      padding: 8px;
      border: 1px solid #555;
      border-radius: 6px;
      background: #1a2a4e;
      color: #e0d8c8;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: #2a3a5e;
      border-color: #c8a96e;
    }

    .action-btn:active { transform: scale(0.97); }

    .action-btn.attack { border-color: #d44; }
    .action-btn.spell { border-color: #94f; }
    .action-btn.defensive { border-color: #4a9; }
    .action-btn.end-turn {
      grid-column: 1 / -1;
      background: #2a2a2a;
      border-color: #666;
    }

    /* Voice controls */
    footer {
      background: #16213e;
      border-top: 2px solid #333;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #c8a96e;
      background: #1a2a4e;
      color: #c8a96e;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-btn.listening {
      background: #4a2020;
      border-color: #f44;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(244, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(244, 68, 68, 0); }
    }

    .voice-status {
      font-size: 0.85rem;
      color: #888;
    }

    .voice-status.speaking { color: #c8a96e; }
    .voice-status.listening { color: #f44; }
  </style>
</head>
<body>
  <header>
    <h1>D&D 5e Voice Session</h1>
    <span id="connection-status" class="status-badge status-disconnected">
      Disconnected
    </span>
  </header>

  <main>
    <!-- Narration log -->
    <div class="narration-panel">
      <div id="narration-log" class="narration-log">
        <div class="narration-entry narration-system">
          Connecting to voice session...
        </div>
      </div>
    </div>

    <!-- Combat panel (hidden until combat starts) -->
    <div id="combat-panel" class="combat-panel">
      <div class="combat-header">
        <h2>Combat - Round <span id="combat-round">1</span></h2>
      </div>
      <div id="combatant-list" class="combatant-list"></div>
      <div id="action-buttons" class="action-buttons" style="display: none;">
        <button class="action-btn attack" onclick="sendAction('attack')">Attack</button>
        <button class="action-btn spell" onclick="sendAction('cast_spell')">Cast Spell</button>
        <button class="action-btn defensive" onclick="sendAction('dodge')">Dodge</button>
        <button class="action-btn defensive" onclick="sendAction('dash')">Dash</button>
        <button class="action-btn defensive" onclick="sendAction('disengage')">Disengage</button>
        <button class="action-btn defensive" onclick="sendAction('hide')">Hide</button>
        <button class="action-btn end-turn" onclick="sendAction('end_turn')">End Turn</button>
      </div>
    </div>
  </main>

  <footer>
    <button id="mic-btn" class="mic-btn" onclick="toggleMic()">
      <span id="mic-icon">&#127908;</span>
    </button>
    <div>
      <div id="voice-status" class="voice-status">Click to connect</div>
      <div id="transcription" style="font-size: 0.75rem; color: #666; margin-top: 2px;"></div>
    </div>
  </footer>

  <!-- LiveKit Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <script src="app.js"></script>
</body>
</html>
