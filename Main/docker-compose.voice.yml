# Voice stack for D&D 5e voice sessions
#
# Runs Riva ASR + TTS alongside the bot.
# LiveKit server runs separately (livekit-server --dev for local dev).
#
# Usage:
#   docker compose -f docker-compose.voice.yml up -d
#
# Requires:
#   NGC_API_KEY in .env (for NVIDIA NIM containers)

services:
  riva-asr:
    image: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us:latest
    container_name: dnd-riva-asr
    runtime: nvidia
    shm_size: 8gb
    ports:
      - "9000:9000"
      - "50051:50051"
    user: "0:0"
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - NIM_HTTP_API_PORT=9000
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=name=parakeet-1-1b-ctc-en-us,mode=str
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - nim-asr-cache:/opt/nim/.cache
      - nim-asr-models:/data/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  riva-tts:
    image: nvcr.io/nim/nvidia/magpie-tts-multilingual:latest
    container_name: dnd-riva-tts
    runtime: nvidia
    shm_size: 8gb
    ports:
      - "9001:9001"
      - "50052:50051"
    user: "0:0"
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - NIM_HTTP_API_PORT=9001
      - NIM_GRPC_API_PORT=50051
      - NIM_TAGS_SELECTOR=name=magpie-tts-multilingual,batch_size=8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - nim-tts-cache:/opt/nim/.cache
      - nim-tts-models:/data/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

volumes:
  nim-asr-cache:
  nim-asr-models:
  nim-tts-cache:
  nim-tts-models:
