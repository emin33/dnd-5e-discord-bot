# ===== MI300X profiles (~192GB HBM3) =====
#
# Container strategy:
#   LLM: rocm/vllm (production) or ollama:rocm (simpler)
#     - vllm/vllm-openai-rocm:gemma4 for Gemma 4 Day 0 support
#     - rocm/vllm-dev:nightly for latest tool-calling fixes
#     - ollama/ollama:rocm for single-model simplicity
#   TTS: Kokoro on CPU (ROCm has MIOpen issues — set KOKORO_DEVICE=cpu)
#     - Or use remsky/Kokoro-FastAPI CPU sidecar container (ONNX)
#   Images: local Flux in separate ROCm PyTorch container, or FAL cloud
#
# Known ROCm gotchas (April 2026):
#   - Gemma 4 vLLM: tool parser __init__ fix merged (vllm#38847),
#     but reasoning/tool-call leakage still open (vllm#39043).
#     Ollama tool calling works fine — uses its own parser.
#   - Kokoro PyTorch on ROCm: MIOpen GEMM workspace failures (pytorch#150168).
#     Model runs at CPU speed on GPU. Force CPU with KOKORO_DEVICE=cpu.
#   - FP8 quantization: broken for Gemma 4 on vLLM (vllm#39049).
#     Use Q4/Q8 quantization instead.
#
# GPU partitioning (optional):
#   SPX (default): 1x 192GB — best for single large model
#   DPX: 2x 96GB — split narrator + image gen
#   sudo amd-smi set --gpu all --compute-partition DPX

# MI300X: Best local narrator + strong brain, cloud-free except images
# Qwen3 235B-A22B is the consensus #1 open-source creative writing model.
# 22B active params (MoE) — inference speed similar to dense 27B.
#
# VRAM budget:
#   Narrator (qwen3:235b-a22b Q4): ~132GB
#   Brain (gemma4:26b): ~15GB
#   Total: ~147GB, ~45GB headroom for KV cache
#   Kokoro: on CPU (KOKORO_DEVICE=cpu), Fish Speech: separate server
#
# Alternative narrators (swap model line):
#   qwen3.5:122b-a10b — ~68GB Q4, best tool calling (BFCL-V4 leader), 262K ctx
#   mistral-large:123b — ~65GB Q4, dense 123B, clear prose (non-commercial license)
#   qwen3.5:27b — ~16GB Q4, current default, leaves room for everything else
mi300x:
  narrator:
    provider: ollama
    model: qwen3:235b-a22b
    context_size: 65000
    tools: full                      # 235B handles full inventory easily
  brain:
    provider: ollama
    model: gemma4:26b
    context_size: 32000
    fallback_to_ollama: false
  memory:
    buffer_size: 50
    verbatim_size: 16
    condensed_size: 20
    compaction_threshold: 12
  immersion:
    tts_enabled: true
    image_enabled: true
    image_frequency: scene_change
    narrator_tts_provider: kokoro
    narrator_tts_voice: af_heart
    character_tts_provider: fish
    image_provider: fal
    # Local images possible via DPX partition — switch to:
    # image_provider: local
    # image_model: black-forest-labs/FLUX.1-dev

# MI300X light: smaller narrator leaves room for local images + Fish TTS on GPU
# Qwen3.5 122B-A10B: newest architecture, 262K context, best tool calling.
# Only 10B active params so prose is lighter than 235B, but still very capable.
#
# VRAM budget:
#   Narrator (qwen3.5:122b-a10b Q8): ~130GB
#   Brain (gemma4:26b): ~15GB
#   Fish Speech S1-mini: ~5GB
#   Total: ~150GB, ~42GB headroom
mi300x_light:
  narrator:
    provider: ollama
    model: qwen3.5:122b-a10b
    context_size: 65000
    tools: full                      # qwen3.5:122b-a10b leads BFCL-V4 tool calling
  brain:
    provider: ollama
    model: gemma4:26b
    context_size: 32000
    fallback_to_ollama: false
  memory:
    buffer_size: 50
    verbatim_size: 16
    condensed_size: 20
    compaction_threshold: 12
  immersion:
    tts_enabled: true
    image_enabled: true
    image_frequency: scene_change
    narrator_tts_provider: kokoro
    narrator_tts_voice: af_heart
    character_tts_provider: fish
    image_provider: fal

# MI300X immersive: full local stack — narrator + brain + TTS + images all on GPU
# Uses the lighter 122B narrator to leave room for Flux Dev images.
# DPX partitioning recommended: 96GB for LLM, 96GB for images.
#
# VRAM budget (DPX mode, 2x 96GB partitions):
#   Partition 1: Narrator (~68GB Q4) + Brain (~15GB) = ~83GB
#   Partition 2: Flux Dev (~24GB) + Fish Speech (~5GB) = ~29GB
#   Kokoro: CPU (KOKORO_DEVICE=cpu)
mi300x_immersive:
  narrator:
    provider: ollama
    model: qwen3.5:122b-a10b
    context_size: 65000
    tools: full
  brain:
    provider: ollama
    model: gemma4:26b
    context_size: 16000
    fallback_to_ollama: false
  memory:
    buffer_size: 40
    verbatim_size: 12
    condensed_size: 16
    compaction_threshold: 10
  immersion:
    tts_enabled: true
    image_enabled: true
    image_frequency: every
    narrator_tts_provider: kokoro
    narrator_tts_voice: af_heart
    character_tts_provider: fish
    image_provider: local
    image_model: black-forest-labs/FLUX.1-dev
    image_steps: 20
    image_guidance: 3.5
