# LLM Profile Configuration
# Switch profiles by setting ACTIVE_PROFILE in .env or environment
# Each profile defines narrator, brain (triage/extraction/compaction), and memory settings

# Production: Sonnet narrates, Groq handles brain
production:
  narrator:
    provider: anthropic
    model: claude-sonnet-4-6
  brain:
    provider: groq
    model: qwen/qwen3-32b
    fallback_to_ollama: true
  memory:
    buffer_size: 30
    compaction_threshold: 8

# Local MoE: everything on one model, zero cost
local_moe:
  narrator:
    provider: ollama
    model: qwen3.5:35b-a3b
  brain:
    provider: ollama
    model: qwen3.5:35b-a3b
    fallback_to_ollama: false
  memory:
    buffer_size: 40
    compaction_threshold: 10

# Local split: MoE narrates, dense 9B does brain (needs ~38GB VRAM)
local_split:
  narrator:
    provider: ollama
    model: qwen3.5:35b-a3b
  brain:
    provider: ollama
    model: qwen3.5:9b
    fallback_to_ollama: false
  memory:
    buffer_size: 40
    compaction_threshold: 10

# Local dense: 27B does everything
local_dense:
  narrator:
    provider: ollama
    model: qwen3.5:27b
  brain:
    provider: ollama
    model: qwen3.5:27b
    fallback_to_ollama: false
  memory:
    buffer_size: 40
    compaction_threshold: 10

# Groq only: cloud 32b does everything
groq_full:
  narrator:
    provider: groq
    model: qwen/qwen3-32b
  brain:
    provider: groq
    model: qwen/qwen3-32b
