# LLM Profile Configuration
# Switch profiles by setting ACTIVE_PROFILE in .env or environment
# Each profile defines narrator, brain (triage/extraction/compaction), and memory settings
#
# Memory settings:
#   buffer_size: Messages held in buffer before overflow → compaction.
#     This IS the narrator's message window — the bookend layout uses all of them.
#     Larger = more verbatim history, but more tokens in the low-attention middle zone.
#   compaction_threshold: Overflow messages before triggering summary generation.

# Production: Sonnet narrates, Groq handles brain
# Sonnet handles 200K context — can use a large message window
production:
  narrator:
    provider: anthropic
    model: claude-sonnet-4-6
    tools: full                      # Sonnet handles full tool inventory reliably
  brain:
    provider: groq
    model: qwen/qwen3-32b
    fallback_to_ollama: true
  memory:
    buffer_size: 40
    verbatim_size: 12
    condensed_size: 16
    compaction_threshold: 10

# NOTE (2026-07-06, Step 2): narration now sends kg context / narrative memory /
# char stats / last-turn trace — local narrator prompts grew ~1.2-4k tokens vs
# pre-Step-2. Sizes below are unchanged without measurement; local_dense was
# measured and bumped (see its comment block).

# Local MoE: everything on one model, zero cost
# Local 35B MoE: 32K context, weaker middle-attention — keep window moderate
local_moe:
  narrator:
    provider: ollama
    model: qwen3.5:35b-a3b
    context_size: 32000
  brain:
    provider: ollama
    model: qwen3.5:35b-a3b
    context_size: 16000
    fallback_to_ollama: false
  memory:
    buffer_size: 24
    verbatim_size: 8
    condensed_size: 10
    compaction_threshold: 6

# Local 9B: lightweight dense model for everything, fits any GPU
local_9b:
  narrator:
    provider: ollama
    model: qwen3.5:9b
  brain:
    provider: ollama
    model: qwen3.5:9b
    fallback_to_ollama: false
  memory:
    buffer_size: 20
    verbatim_size: 6
    condensed_size: 8
    compaction_threshold: 5

# Local split: MoE narrates, dense 9B does brain
# MoE ~20GB + 9B ~7GB = ~27GB, fits on 32GB GPU
local_split:
  narrator:
    provider: ollama
    model: qwen3.5:35b-a3b
    context_size: 32000
  brain:
    provider: ollama
    model: qwen3.5:9b
    context_size: 8000
    fallback_to_ollama: false
  memory:
    buffer_size: 24
    verbatim_size: 8
    condensed_size: 10
    compaction_threshold: 6

# Local dense: qwen3.5:27b narrator + gemma4:e2b brain
#
# Phase C benchmarks (2026-04-26):
#   qwen3.5:27b: 100% routing / 100% raw / 4.0s avg per call
#   gemma4:e4b:  100% routing / 96%  raw / 1.3s avg
#   gemma4:e2b:  100% routing / 88%  raw / 0.9s avg  ← best brain ROI
# Phase B veto rescues the raw-classifier misses on e2b, so routing
# accuracy is still 100%. e2b is also best at action_type (10/10).
# Brain runs every turn — saving ~3s per call vs qwen-as-brain
# matters more than the raw-accuracy gap.
#
# VRAM budget (32GB GPU):
#   qwen3.5:27b Q4 weights:   ~14GB
#   KV cache @ 24k:           ~3GB   (scales linearly; was ~1.5-2GB @ 16k)
#   qwen3.5:27b Q4 @ 24k:     ~17GB
#   gemma4:e2b @ 4k:          ~5-7GB
#   Total:                    ~22-24GB → ~8GB free for Kokoro/images/etc.
# Context (measured 2026-07-06, post-Step-2): narration now sends kg context /
# narrative memory / char stats — realistic end-game prompts run ~14-15.5k
# tokens (messages ~8.7k + full-tier tool schemas ~5.1k + 1500 completion) and
# worst cases EXCEED 16k, where Ollama silently truncates the prompt head
# (system persona + world_state). 24k gives ~8k tokens of headroom.
local_dense:
  narrator:
    provider: ollama
    model: qwen3.5:27b
    context_size: 24000
    tools: full                      # 27B dense hit 88% on full tier in benchmark
  brain:
    provider: ollama
    model: gemma4:e2b
    context_size: 4000
    fallback_to_ollama: false
  memory:
    buffer_size: 24
    verbatim_size: 8
    condensed_size: 10
    compaction_threshold: 6

